<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Sports Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        input[type="text"], input[type="number"] { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        input[type="submit"] { background-color: #28a745; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; }
        input[type="submit"]:hover { background-color: #218838; }
        .result { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-left: 4px solid #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kalkulator Poin Turnamen</h2>
        <form method="POST">
            <label>Nama Tim:</label>
            <input type="text" name="nama_tim" required>
            
            <label>Jumlah Kill:</label>
            <input type="number" name="kill" required>
            
            <label>Placement (Ranking 1-16):</label>
            <input type="number" name="placement" required>
            
            <input type="submit" value="Hitung Poin">
        </form>

        {% if hasil %}
        <div class="result">
            <strong>Berhasil!</strong><br>
            {{ hasil }}
        </div>
        {% endif %}
    </div>
</body>
</html>
